name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    name: Backend — Naive Bayes + Risk Engine tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Run automated tests (Naive Bayes classifier + risk engine)
        working-directory: backend
        run: npm run test

  frontend-build:
    name: Frontend — production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Build (fails on any compile error)
        working-directory: frontend
        run: npm run build
